databaseChangeLog:
  - changeSet:
        id: 002-add-missing-columns
        author: mustaphamoutaki
        changes:
          - addColumn:
              tableName: users
              columns:
                - column:
                    name: username
                    type: varchar(255)
                    constraints:
                      nullable: false
                      unique: true

                - column:
                    name: role
                    type: varchar(50)
                    constraints:
                      nullable: false

                - column:
                    name: phone_number
                    type: varchar(30)

                - column:
                    name: profile_picture
                    type: varchar(255)

                - column:
                    name: is_active
                    type: boolean
                    defaultValueBoolean: true

                - column:
                    name: is_deleted
                    type: boolean
                    defaultValueBoolean: false

                - column:
                    name: created_at
                    type: timestamp

                - column:
                    name: updated_at
                    type: timestamp

                - column:
                    name: created_by
                    type: varchar(255)


