databaseChangeLog:
  - changeSet:
      id: 003-create-clients-table
      author: mustaphamoutaki
      changes:
        - createTable:
            tableName: clients
            columns:

              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: registration_date
                  type: timestamp

              - column:
                  name: satisfaction_score
                  type: int

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP