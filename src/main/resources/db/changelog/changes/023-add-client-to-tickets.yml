databaseChangeLog:
  - changeSet:
      id: 023-add-client-to-tickets
      author: mustaphamoutaki
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: tickets
              columnName: client_id
      changes:
        - addColumn:
            tableName: tickets
            columns:
              - column:
                  name: client_id
                  type: bigint
                  constraints:
                    nullable: false
                  defaultValueNumeric: 1