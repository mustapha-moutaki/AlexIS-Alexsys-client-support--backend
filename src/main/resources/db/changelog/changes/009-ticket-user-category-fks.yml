databaseChangeLog:
  - changeSet:
      id: 008-ticket-user-category-fks
      author: mustaphamoutaki
      changes:

        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tickets_users_created_by
            onDelete: RESTRICT

        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_tickets_categories
            onDelete: SET NULL

        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: assigned_agent_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tickets_users_assigned_agent
            onDelete: SET NULL