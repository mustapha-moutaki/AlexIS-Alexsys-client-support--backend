databaseChangeLog:
  - changeSet:
      id: 021-update-tickets-table
      author: mustaphamoutaki
      changes:
        - createTable:
            tableName: tickets
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: title, type: varchar(255), constraints: { nullable: false } }
              - column: { name: description, type: text, constraints: { nullable: false } }
              - column: { name: status, type: varchar(30), constraints: { nullable: false } }
              - column: { name: priority, type: varchar(30), constraints: { nullable: false } } # Changed to varchar
              - column: { name: issue_type, type: varchar(50), constraints: { nullable: false } }
              - column: { name: category_id, type: bigint, constraints: { nullable: false, foreignKeyName: fk_ticket_category, referencedTableName: categories, referencedColumnNames: id } }
              - column: { name: client_id, type: bigint, constraints: { nullable: false } } # Ensure this exists in Java
              - column: { name: assigned_agent_id, type: bigint }
              - column: { name: created_by, type: varchar(50), constraints: { nullable: false } }
              - column: { name: created_at, type: timestamp, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: timestamp }
              - column: { name: assigned_at, type: timestamp }
              - column: { name: resolved_at, type: timestamp }
              - column: { name: closed_at, type: timestamp }