databaseChangeLog:
  - changeSet:
      id: 028-create-attachments-table
      author: mustapha-moutaki
      changes:
        - createTable:
            tableName: attachments
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: ticket_id
                  type: bigint

              - column:
                  name: file_name
                  type: varchar(255)

              - column:
                  name: file_url
                  type: varchar(500)

              - column:
                  name: file_type
                  type: varchar(100)

              - column:
                  name: file_size
                  type: bigint

              - column:
                  name: uploaded_at
                  type: timestamp