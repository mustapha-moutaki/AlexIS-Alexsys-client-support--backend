spring:
  application:
    name: alexsis-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate  # st: Don't let Hibernate create tables, let Liquibase do it
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

  h2:
    console:
      enabled: true
      path: /h2-console

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: dev,test
    drop-first: true  # st: Drop all tables before running migrations

jwt:
  secret: MyDevelopmentJwtSecretKeyIsAtLeast32BytesLongForTesting123456789
  access-token-expiration: 3600000
  refresh-token-expiration: 86400000