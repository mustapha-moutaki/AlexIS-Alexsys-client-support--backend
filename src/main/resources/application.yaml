spring:
  application:
    name: alexsis
  jpa:
    hibernate:
      ddl-auto: none
#      here we disable hibernate from automatically creating tables, we will do it manually
# st: disable default error page to allow custom exception handlers
  error:
    include-message: always
    include-binding-errors: always
server:
  error:
    whitelabel:
      enabled: false
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}